a24.000.001en: "Hello! I'm the Skyeng Virtual Assistant."
a24.000.002en: "Dear teachers! Pay attention: payments on January 19-23 are made according to the standard schedule within 5 days."
a24.000.003en: "Please repeat your question so we can answer it correctly."
a24.000.004en: "Please choose the most suitable option."
a24.000.005en: "To connect to the appropriate group of operators, please write your question below or select one of the topics:"
a24.000.006en: "Connecting you to an operator. Please write your question here again if you have already done it."
a24.000.007en: "I'm just learning and will become better soon. Connecting you to an operator. Please write your question here if you haven't done it yet."
a24.000.008en: "I apologize for the confusion. It seems like I'm having difficulty understanding your question. You can connect with an operator by clicking the “Contact the operator” button, or you can try rephrasing your question for better clarity."
a24.000.009en: "I’m sorry, I couldn’t understand your request. Try rephrasing the question or contact a manager."
a24.000.010en: "Glad to be of help. Always connected!"
a24.000.011en: "Bye-bye."
a24.000.012en: "Was this helpful?"
a24.000.013en: "Thank you for answering, we'll try to improve in the future."
a24.000.014en: "Glad to be of help! Please rate our bot's services."
a24.000.015en: "Thank you for your feedback!"
a24.000.016en: "Click on the button with the appropriate topic that aligns with your query  → select a request → receive a detailed answer to your query.  \n- If the section you initially chose does not contain the answer you're looking for, please select another relevant topic.  \n- If you found all the necessary information and your query was resolved, please take a moment to note how useful the interaction was. Your feedback is crucial in improving our service.  \n- If you were unable to find the answer to your question, try to select another topic or select 'No, the issue has not been resolved' → specify what information you were missing in the proposed answer, or choose 'Connect with the Operator' for direct assistance."
a24.000.017en: "Read the [instructions](https://helpcenter.skyeng.ru/page/students_discipline) on how to save the lesson."
a24.007.001en: "We have collected detailed instructions for the student about [where the test is](https://helpcenter.skyeng.ru/page/Gde-nakhoditsya-test) and [how to redo the test](https://helpcenter.skyeng.ru/page/Kak-peredelat-test).\nPlease send them to your student."
a24.007.002en: "Students can learn words both in the personal account and in the Skyeng mobile application. The data is synchronized, so the student will not lose a single new word.  \nTo access this feature, hover your mouse over “Еще” and go to the “Словарь” section in your personal account. If the student is using the application: go to the “Главная” section, then click “Словарь” to improve your vocabulary.  \nDetailed instructions are available in [this article](https://helpcenter.skyeng.ru/page/slovar)."
a24.007.003en: "We have collected detailed instructions for the student on homework:  \n1. [How to access homework](https://helpcenter.skyeng.ru/page/Gde-nakhoditsya-domashka).\n2. [Homework: where to find it and how to do it](https://helpcenter.skyeng.ru/page/Domashneye-zadaniye-gde-posmotret-i-kak-vypolnyat).\n3. [How to redo your homework](https://helpcenter.skyeng.ru/page/Kak-peredelat-domashku).\n4. [Homework: common problems](https://helpcenter.skyeng.ru/page/Domashneye-zadaniye-problemy).  \nPlease review them, and forward them to your student upon request."
a24.007.004en: "All materials are available in the student’s personal account or via [this direct link](https://vimbox.skyeng.ru/portfolio).  \nInstructions for adult items are located [here](https://helpcenter.skyeng.ru/page/Poslushat-posmotret-zapis-uroka#GdemoznoproslusatzapisurokavlicnomkabineteucenikaSkyeng).  \nInstructions for children's subjects can be found in [this article](https://helpcenter.skyeng.ru/page/Poslushat-posmotret-zapis-uroka#GdemoznoproslusatzapisurokavlicnomkabineteucenikaSkysmart)."
a24.007.005en: "Share with your student [this link](https://group.skyeng.ru/booking) to access the page for children’s group meetings in Zoom.  \nFor adult learners, please share [this guide](https://bittersweet-firewall-fcb.notion.site/LIFE-6f2d3768b25e408bbc7bc7a71b39c4c5), which contains answers to all frequently asked questions."
